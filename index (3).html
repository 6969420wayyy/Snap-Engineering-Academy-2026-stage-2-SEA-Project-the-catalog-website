<!doctype html>
<html>
  <head>
    <title>SnapCrypto | Catalog</title>
    <meta name="description" content="A Catalog of Cryptocurrencies" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>

    <header class="main-header">
      <h1 class="title">👻 Snap<span class="yellow">Crypto</span></h1>
      <p class="tagline">Your fast-lane guide to the crypto universe.</p>
    </header>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search by name or symbol..." onkeyup="handleSearch()" />
    </div>

    <div class="filter-buttons">
      <button onclick="filterByCategory('All')">All</button>
      <button onclick="filterByCategory('Layer 1')">Layer 1</button>
      <button onclick="filterByCategory('DeFi')">DeFi</button>
      <button onclick="filterByCategory('Meme')">Meme</button>
      <button onclick="filterByCategory('Stablecoin')">Stablecoin</button>
      <button onclick="filterByCategory('AI')">AI</button>
    </div>

    <div class="sort-row">
      <label for="sortSelect">Sort by: </label>
      <select id="sortSelect" onchange="handleSort()">
        <option value="default">Default</option>
        <option value="price-high">Price: High to Low</option>
        <option value="price-low">Price: Low to High</option>
        <option value="name-az">Name: A to Z</option>
      </select>
    </div>

    <p id="resultsCount" class="results-count">Showing 15 coins</p>

    <div id="card-container"></div>

    <div class="card" style="display: none">
      <img src="" alt="Coin Logo" class="card-img" />
      <div class="card-content">
        <h2>Coin Name</h2>
        <p class="card-symbol">SYM</p>
        <span class="card-category">Category</span>
        <p class="card-description">Description goes here.</p>
        <p class="card-price"><span class="dollar">$</span>0.00</p>
      </div>
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <p>🔭 No coins found. Try a different search or filter.</p>
    </div>

    <div class="footer">
      <button onclick="removeLastCard()">Remove Last Card</button>
      <button onclick="quoteAlert()">Get A Quote!</button>
    </div>

  </body>
</html>
